<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>NexAI</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="logo.png">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">   
    <div class="logo">⚡ NEX-GPT</div>
    
<button class="theme-btn" onclick="setTheme('theme-neon', this)">Neon</button>
<button class="theme-btn" onclick="setTheme('theme-blue', this)">Blue</button>
<button class="theme-btn" onclick="setTheme('theme-green', this)">Green</button>
<button class="theme-btn" onclick="setTheme('theme-purple', this)">Purple</button>

    <div class="footer">MR ROHIT AI</div>
  </div>
  

  <!-- MAIN -->
  <div class="main">

    <div class="header">🔥 NexAI</div>

    <div id="chatBox"></div>

    <div class="input-area">
      <input id="userInput" placeholder="Ask something..." />
      <button id="sendBtn">SEND ⚡</button>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
