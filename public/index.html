<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Rohit AI</title>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

#chatBox{
  height:500px;
  overflow-y:auto;
  border:1px solid #444;
  padding:10px;
  margin-bottom:10px;
}

input{
  width:80%;
  padding:10px;
}

button{
  padding:10px;
}

</style>

</head>

<body>

<h1>Rohit AI</h1>

<div id="chatBox">
<div style="color:lightgreen;">
AI Online 24/7
</div>
</div>

<input
id="userInput"
type="text"
placeholder="Type message..."

>

<button onclick="sendMessage()">
Send
</button>

<script>

async function sendMessage() {

  const input =
    document.getElementById("userInput");

  const chatBox =
    document.getElementById("chatBox");

  const userMessage =
    input.value.trim();

  if (!userMessage) return;

  chatBox.innerHTML +=
    "<div><b>You:</b> " +
    userMessage +
    "</div>";

  input.value = "";

  try {

    const res = await fetch(
      "/chat",
      {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          message: userMessage
        })

      }
    );

    const data = await res.json();

    chatBox.innerHTML +=
      "<div><b>AI:</b> " +
      data.reply +
      "</div>";

    chatBox.scrollTop =
      chatBox.scrollHeight;

  } catch (error) {

    chatBox.innerHTML +=
      "<div style='color:red;'>Connection Error</div>";

  }

}

</script>

</body>

</html>
