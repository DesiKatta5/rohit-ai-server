<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyxoGPT</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="logo.png">
</head>

<body class="theme-light">
  <div class="app">
    <aside class="sidebar" id="appSidebar">
      <div class="sidebar-top">
        <div class="brand">
          <span class="brand-mark">N</span>
          <span>NyxoGPT</span>
        </div>
        <button class="icon-btn" id="sidebarToggle" type="button" aria-label="Collapse sidebar" aria-controls="appSidebar" aria-expanded="true">[]</button>
      </div>

      <nav class="primary-nav" aria-label="Main navigation">
        <button class="nav-item active" type="button" onclick="startNewChat()">
          <span class="nav-icon">+</span>
          <span>New chat</span>
        </button>
        <button class="nav-item" type="button" onclick="openSearchChats()">
          <span class="nav-icon">
            <img class="nav-search-icon" src="search-logo.png" alt="">
          </span>
          <span>Search chats</span>
        </button>
        <button class="nav-item" type="button" onclick="toggleThemes()">
          <span class="nav-icon">
            <img class="nav-logo-icon" src="theme-logo.png" alt="">
          </span>
          <span>Themes</span>
        </button>
        <button class="nav-item" id="gamesButton" type="button" onclick="openGames()">
          <span class="nav-icon game-nav-icon" aria-hidden="true">
            <img class="game-nav-logo minecraft-logo" src="minecraft-logo.jpg" alt="">
            <img class="game-nav-logo roblox-logo" src="roblox-logo.png" alt="">
          </span>
          <span>Games</span>
        </button>
      </nav>

      <div class="theme-menu" id="themeMenu">
        <button class="theme-btn" type="button" onclick="setTheme('theme-light')">Light</button>
        <button class="theme-btn" type="button" onclick="setTheme('theme-dark')">Dark</button>
        <button class="theme-btn" type="button" onclick="setTheme('theme-blue')">Blue</button>
        <button class="theme-btn" type="button" onclick="setTheme('theme-green')">Green</button>
        <button class="theme-btn" type="button" onclick="setTheme('theme-dark-blue')">Dark Blue</button>
        <button class="theme-btn" type="button" onclick="setTheme('theme-dark-red')">Dark Red</button>
        <button class="theme-btn" type="button" onclick="startAutoTheme()">Auto</button>
      </div>

      <div class="game-menu" id="gameMenu" aria-live="polite">
        <div class="game-menu-title">Choose a game</div>
        <button class="game-btn" type="button" data-game="minecraft">
          <img class="game-list-logo" src="minecraft-logo.jpg" alt="">
          <span>
            <strong>Minecraft</strong>
            <small>Ask about survival, redstone, builds, and servers.</small>
          </span>
        </button>
        <button class="game-btn" type="button" data-game="roblox">
          <img class="game-list-logo" src="roblox-logo.png" alt="">
          <span>
            <strong>Roblox</strong>
            <small>Ask about scripts, maps, avatars, and gameplay.</small>
          </span>
        </button>
      </div>

      <section class="chat-list recents" aria-label="Recent chats" id="recentChats">
        <h2>Recents</h2>
      </section>

      <div class="sidebar-footer">
        <div class="builder-credit">Build By MR ROHIT</div>
        <button onclick="openHistory()" class="offer-btn" type="button">Chat history</button>
        <div id="accountArea" class="account-area">
          <button class="login-btn" onclick="openLogin()" id="loginButton" type="button">Login</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="mobile-menu" id="mobileMenuButton" type="button" aria-label="Open sidebar" aria-controls="appSidebar" aria-expanded="false">=</button>
        <div></div>
      </header>

      <section class="workspace">
        <div class="welcome" id="welcome">
          <h1 id="welcomeText">Welcome. What's going on?</h1>
        </div>

        <div id="chatBox" aria-live="polite"></div>

        <div class="composer-wrap">
          <div class="image-preview" id="imagePreview" aria-live="polite"></div>
          <div class="composer">
            <button class="composer-icon attach-btn" type="button" aria-label="Upload image" onclick="openImagePicker()">+</button>
            <input id="imageInput" class="file-input" type="file" accept="image/*">
            <input id="userInput" placeholder="Ask anything" autocomplete="off">
            <div class="model-picker">
              <button class="mode-btn" id="modelPickerButton" type="button" aria-expanded="false">
                <span id="selectedModelLabel">NYXO Flash</span>
              </button>
              <div class="model-menu" id="modelMenu">
                <button class="model-option" type="button" data-model="nyxo-1.3">
                  <span class="model-check"></span>
                  <span>
                    <strong>NYXO 1.3</strong>
                    <small>Fastest answers</small>
                  </span>
                </button>
                <button class="model-option active" type="button" data-model="nyxo-flash">
                  <span class="model-check">✓</span>
                  <span>
                    <strong>NYXO Flash</strong>
                    <small>All-around help</small>
                  </span>
                </button>
                <button class="model-option" type="button" data-model="nyxo-pro">
                  <span class="model-check"></span>
                  <span>
                    <strong>NYXO Pro</strong>
                    <small>Advanced maths and code</small>
                  </span>
                </button>
                <button class="model-option" type="button" data-model="nyxo-beta">
                  <span class="model-check"></span>
                  <span>
                    <strong>NYXO Beta</strong>
                    <small>Vision and OCR</small>
                  </span>
                </button>
                <button class="thinking-row" id="thinkingToggle" type="button" aria-expanded="false">
                  <span>
                    <strong>Thinking level</strong>
                    <small id="selectedThinkingLabel">Normal</small>
                  </span>
                  <span class="thinking-arrow">&rsaquo;</span>
                </button>
                <div class="thinking-menu" id="thinkingMenu">
                  <button class="thinking-option active" type="button" data-thinking="normal">
                    <span class="thinking-check">✓</span>
                    <span>Normal</span>
                  </button>
                  <button class="thinking-option" type="button" data-thinking="medium">
                    <span class="thinking-check"></span>
                    <span>Medium</span>
                  </button>
                  <button class="thinking-option" type="button" data-thinking="high">
                    <span class="thinking-check"></span>
                    <span>High</span>
                  </button>
                  <button class="thinking-option" type="button" data-thinking="highest">
                    <span class="thinking-check"></span>
                    <span>Highest</span>
                  </button>
                </div>
              </div>
            </div>
            <button class="composer-icon mic-btn" id="micBtn" type="button" aria-label="Voice input"></button>
            <button class="composer-icon voice-chat-btn" id="voiceChatBtn" type="button" aria-label="Use voice" aria-pressed="false" title="Use voice">
              <span class="voice-wave-icon" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </span>
            </button>
          </div>

          <div class="quick-actions">
            <button type="button">Enhance an image</button>
            <button type="button">Write or edit</button>
            <button type="button">Look something up</button>
          </div>
        </div>

        <div class="voice-orb-panel" id="voiceOrbPanel" aria-hidden="true">
          <div class="voice-orb" aria-hidden="true">
            <span class="orb-glow"></span>
            <span class="orb-ring orb-ring-a"></span>
            <span class="orb-ring orb-ring-b"></span>
            <span class="orb-ring orb-ring-c"></span>
          </div>
          <span class="sr-only" id="voiceOrbStatus" aria-live="polite">Voice mode off</span>
        </div>
      </section>
    </main>
  </div>

  <div id="loginPopup" class="login-popup">
    <div class="login-box">
      <h2>Login to NyxoGPT</h2>
      <input type="email" id="gmail" placeholder="Enter Gmail">
      <input type="password" id="password" placeholder="Enter Password">
      <button class="main-login-btn" onclick="login()" type="button">Login</button>
      <div class="divider">OR</div>
      <button class="google-btn" onclick="googleLogin()" type="button">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="">
        Continue with Google
      </button>
      <button class="close-btn" onclick="closeLogin()" type="button">Close</button>
    </div>
  </div>

  <div id="historyPopup" class="history-popup">
    <div class="history-box">
      <div class="history-header">
        <h2>Chat History</h2>
        <button onclick="closeHistory()" type="button" aria-label="Close history">x</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

  <div id="searchPopup" class="search-popup">
    <div class="search-box">
      <div class="search-header">
        <h2>Search chats</h2>
        <button onclick="closeSearchChats()" type="button" aria-label="Close search">x</button>
      </div>
      <input id="chatSearchInput" type="search" placeholder="Enter chat name" autocomplete="off">
      <div id="searchResults"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script>

      apiKey: "AIzaSyAFnJyCI8Y5MzxMYeVLSCgkm5sFVZLEmFs",

    firebase.initializeApp(firebaseConfig);
  </script>
</body>
</html>
